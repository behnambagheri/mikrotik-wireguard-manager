<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">MikroTik WireGuard Manager panel preview</title>
  <desc id="desc">A stylized preview of the web dashboard with router controls, diagnostics, groups, and clients.</desc>
  <defs>
